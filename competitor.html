<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Competitor - Compono Intelligence Hub</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <div class="brand">
      <img src="assets/logo-horizontal-color.png" alt="Compono">
      <span class="brand-title">Competitor Intelligence Hub</span>
    </div>
    <div class="last-updated">Last updated: <strong id="lastUpdated"></strong></div>
  </div>
</header>

<main class="wrap" id="page"></main>

<footer class="site-footer">
  <div class="wrap">Compono internal tool. Pricing and company data are approximate and verified on the monthly refresh cycle. Not for external distribution.</div>
</footer>

<script src="data.js"></script>
<script>
  document.getElementById("lastUpdated").textContent = LAST_UPDATED;

  const id = new URLSearchParams(location.search).get("id");
  const c = COMPETITORS.find(x => x.id === id);
  const page = document.getElementById("page");

  if (!c) {
    page.innerHTML = `<p style="padding:40px 0">Competitor not found. <a href="index.html">Back to the hub</a>.</p>`;
  } else {
    document.title = c.name + " - Compono Intelligence Hub";
    const cat = CATEGORIES[c.category];

    // Company logo chip. Uses the competitor's website favicon via Google's
    // public favicon service (no files to host or maintain). If a competitor
    // has no domain set, or the image fails, a coloured initial shows instead.
    function logoChip(domain, name, category, size) {
      const initial = (name || "?").trim().charAt(0).toUpperCase();
      const img = domain
        ? `<img class="logo-img" src="https://www.google.com/s2/favicons?domain=${domain}&sz=128" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : "";
      return `<span class="logo-chip ${size || ""} ${category || ""}">${img}<span class="logo-fallback"${domain ? ' style="display:none"' : ""}>${initial}</span></span>`;
    }
    const compChip = logoChip(c.domain, c.name, c.category);
    const compChipLg = logoChip(c.domain, c.name, c.category, "lg");
    const compChipSm = logoChip(c.domain, c.name, c.category, "sm");
    const componoChipSm = logoChip("compono.com", "Compono", "", "sm");
    const componoChip = logoChip("compono.com", "Compono", "");

    const assessSection = (c.category === "hire" && c.assessment) ? `
      <div class="section">
        <h2>Assessment capability</h2>
        <div class="panel">
          <span class="pill ${c.assessment.level === "Native" ? "assess-native" : c.assessment.level === "Basic" ? "assess-basic" : "assess-none"}">${c.assessment.level}</span>
          <p style="margin-top:12px; font-size:14px;">${c.assessment.detail}</p>
        </div>
      </div>` : "";

    const recent = c.recentActivity && c.recentActivity.length
      ? c.recentActivity.map(a => `<div class="activity-item"><div class="date">${a.date}</div>${a.note}</div>`).join("")
      : `<p class="recent-empty">No entries yet - run the monthly refresh prompt to populate this section with the latest product releases, brand messaging changes and partnerships.</p>`;

    page.innerHTML = `
      <a class="back-link" href="category.html?cat=${c.category}">← Back to ${cat.label} competitors</a>

      <div class="comp-header ${c.category}">
        <div class="eyebrow">${cat.label} competitor</div>
        <div class="comp-title-row">${compChipLg}<h1>${c.name}</h1></div>
        <p style="color:var(--muted); max-width:760px;">${c.summary}</p>
        <div class="card-meta" style="margin-top:14px;">
          <span class="pill">${c.targetMarket}</span>
        </div>
      </div>

      ${c.quickTake ? `
      <div class="section">
        <div class="quick-take ${c.category}">
          <h2>Quick take</h2>
          <div class="qt-row"><div class="qt-label">Their pitch</div><p>${c.quickTake.theirPitch}</p></div>
          <div class="qt-row"><div class="qt-label">Our angle</div><p>${c.quickTake.ourAngle}</p></div>
          <div class="qt-row"><div class="qt-label">Watch out</div><p>${c.quickTake.watchOut}</p></div>
        </div>
      </div>` : ""}

      <div class="section">
        <h2>Company snapshot</h2>
        <div class="panel">
          <div class="snapshot-grid">
            <div class="snap-item"><div class="label">HQ</div><div class="value">${c.snapshot.hq}</div></div>
            <div class="snap-item"><div class="label">Founded</div><div class="value">${c.snapshot.founded}</div></div>
            <div class="snap-item"><div class="label">Funding</div><div class="value">${c.snapshot.funding}</div></div>
            <div class="snap-item"><div class="label">Headcount</div><div class="value">${c.snapshot.headcount}</div></div>
            <div class="snap-item"><div class="label">ANZ presence</div><div class="value">${c.snapshot.anz}</div></div>
          </div>
        </div>
      </div>

      ${assessSection}

      <div class="section">
        <h2>Pricing model</h2>
        <div class="panel"><p style="font-size:14.5px;">${c.pricing}</p></div>
      </div>

      <div class="section">
        <h2>Key features</h2>
        <div class="panel">
          <ul class="clean">${c.features.map(f => `<li>${f}</li>`).join("")}</ul>
        </div>
      </div>

      <div class="section">
        <h2>Key integrations</h2>
        <div class="panel">
          ${c.integrations && c.integrations.length
            ? `<ul class="clean">${c.integrations.map(i => `<li>${i}</li>`).join("")}</ul>`
            : `<p class="recent-empty">No integrations listed yet - add them on the next refresh.</p>`}
        </div>
      </div>

      <div class="section">
        <h2>FAB - theirs vs ours</h2>
        <div class="fab-grid">
          <div class="panel fab-col theirs">
            <h3>${compChip}<span>${c.name}'s pitch</span></h3>
            <div class="fab-block"><div class="fab-label">Features</div><p>${c.fabTheirs.features}</p></div>
            <div class="fab-block"><div class="fab-label">Advantages</div><p>${c.fabTheirs.advantages}</p></div>
            <div class="fab-block"><div class="fab-label">Benefits</div><p>${c.fabTheirs.benefits}</p></div>
          </div>
          <div class="panel fab-col ours">
            <h3>${componoChip}<span>Compono in this matchup</span></h3>
            <div class="fab-block"><div class="fab-label">Features</div><p>${c.fabOurs.features}</p></div>
            <div class="fab-block"><div class="fab-label">Advantages</div><p>${c.fabOurs.advantages}</p></div>
            <div class="fab-block"><div class="fab-label">Benefits</div><p>${c.fabOurs.benefits}</p></div>
          </div>
        </div>
      </div>


      ${c.fabComparison ? `
      <div class="section">
        <details class="fab-compare">
          <summary>
            <span class="fab-compare-title">Feature comparison - ${c.name} vs Compono</span>
            <span class="fab-compare-hint">Click to expand</span>
          </summary>
          <div class="fab-compare-body">
            <div class="fab-legend">
              <span><i class="mk yes">&#10003;</i> Native</span>
              <span><i class="mk partial">&#9680;</i> Partial / via integration</span>
              <span><i class="mk no">&#10007;</i> None</span>
            </div>
            ${c.fabComparison.groups.map(g => `
              <div class="fab-compare-group">
                <div class="fab-compare-grouptitle">${g.title}</div>
                <table class="fab-compare-table">
                  <colgroup><col class="col-cap"><col class="col-them"><col class="col-us"></colgroup>
                  <thead>
                    <tr><th class="cap">Capability</th><th class="vendor"><span class="th-vendor">${compChipSm}<span>${c.name}</span></span></th><th class="vendor us"><span class="th-vendor">${componoChipSm}<span>Compono</span></span></th></tr>
                  </thead>
                  <tbody>
                    ${g.rows.map(r => `
                      <tr>
                        <td class="cap">${r.label}</td>
                        <td class="mark"><i class="mk ${r.them}">${r.them === "yes" ? "&#10003;" : r.them === "partial" ? "&#9680;" : "&#10007;"}</i></td>
                        <td class="mark us"><i class="mk ${r.us}">${r.us === "yes" ? "&#10003;" : r.us === "partial" ? "&#9680;" : "&#10007;"}</i></td>
                      </tr>`).join("")}
                  </tbody>
                </table>
              </div>`).join("")}
          </div>
        </details>
      </div>` : ""}

      <div class="section">
        <div class="two-col">
          <div>
            <h2>How Compono wins</h2>
            <div class="panel"><ul class="clean wins">${c.wins.map(w => `<li>${w}</li>`).join("")}</ul></div>
          </div>
          <div>
            <h2>How Compono loses</h2>
            <div class="panel"><ul class="clean losses">${c.losses.map(l => `<li>${l}</li>`).join("")}</ul></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="battlecard">
          <div class="bc-head">
            <h2>Battle card seed</h2>
            <button class="copy-btn" id="copyBattlecard" type="button" title="Copy the battle card text">Copy</button>
          </div>
          <p>${c.battlecard}</p>
        </div>
      </div>

      ${c.landmines && c.landmines.length ? `
      <div class="section">
        <h2>Landmine questions</h2>
        <div class="panel">
          <p class="landmine-intro">Ask these in the call - they expose what ${c.name} cannot answer.</p>
          <ol class="landmines">${c.landmines.map(q => `<li>${q}</li>`).join("")}</ol>
        </div>
      </div>` : ""}

      <div class="section">
        <h2>Social / brand signal</h2>
        <div class="panel"><p style="font-size:14px;">${c.social}</p></div>
      </div>

      <div class="section">
        <h2>Recent activity</h2>
        <div class="panel">${recent}</div>
      </div>
    `;

    // Copy the battle card text to the clipboard, with a fallback for
    // older browsers. The button flips to "Copied" briefly as feedback.
    const copyBtn = document.getElementById("copyBattlecard");
    if (copyBtn) {
      copyBtn.addEventListener("click", () => {
        const text = c.name + " - battle card seed\n\n" + c.battlecard;
        const done = () => {
          copyBtn.textContent = "Copied";
          copyBtn.classList.add("copied");
          setTimeout(() => { copyBtn.textContent = "Copy"; copyBtn.classList.remove("copied"); }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else {
          fallbackCopy(text, done);
        }
      });
    }
    function fallbackCopy(text, done) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); done(); } catch (e) {}
      document.body.removeChild(ta);
    }

    // Print support: open every collapsed comparison table and make all
    // sections visible before printing, then restore afterwards.
    window.addEventListener("beforeprint", () => {
      document.querySelectorAll("details").forEach(d => {
        d.dataset.wasOpen = d.open ? "1" : "";
        d.open = true;
      });
      document.querySelectorAll(".reveal").forEach(el => el.classList.add("in"));
    });
    window.addEventListener("afterprint", () => {
      document.querySelectorAll("details").forEach(d => {
        if (!d.dataset.wasOpen) d.open = false;
      });
    });
  }
</script>
  <script src="enhance.js"></script>
</body>
</html>
